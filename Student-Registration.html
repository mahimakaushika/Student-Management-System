<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart - Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #0ea5e9; border-bottom: 3px solid #0ea5e9; }
        .card-animate { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border-top-color: #3498db; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800">

    <header class="glass-header sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-sky-200">S</div>
                    <div>
                        <h1 class="font-extrabold text-lg leading-tight tracking-tight">StudentMS</h1>
                        <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Google Cloud Storage</p>
                    </div>
                </div>
                <div id="connection-indicator" class="flex items-center gap-2 bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-xs font-bold border border-slate-200">
                    <span class="w-2 h-2 rounded-full bg-slate-400" id="status-dot"></span>
                    <span id="status-text">Ready</span>
                </div>
            </div>
        </div>
        
        <div class="max-w-6xl mx-auto px-4">
            <nav class="flex gap-8 overflow-x-auto no-scrollbar border-t border-slate-100">
                <button onclick="switchTab('register')" id="btn-register" class="tab-active py-4 px-2 text-sm font-semibold transition-all whitespace-nowrap">Registration</button>
                <button onclick="switchTab('directory')" id="btn-directory" class="py-4 px-2 text-sm font-semibold text-slate-500 hover:text-sky-500 transition-all whitespace-nowrap">Student Records</button>
                <button onclick="switchTab('stats')" id="btn-stats" class="py-4 px-2 text-sm font-semibold text-slate-500 hover:text-sky-500 transition-all whitespace-nowrap">Analytics</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- VIEW: REGISTRATION -->
        <div id="view-register" class="card-animate space-y-8">
            <form id="mainForm">
                <!-- Personal Info -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-sky-100 text-sky-600 p-2 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        </span>
                        <h2 class="text-xl font-bold">Personal Information</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        <div class="lg:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                            <input type="text" name="full_name" placeholder="John Doe" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">NIC Number</label>
                            <input type="text" name="nic" placeholder="200XXXXXXXXX" maxlength="12" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Email Address</label>
                            <input type="email" name="email" placeholder="johndoe@example.com" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Index No</label>
                            <input type="text" name="index_no" placeholder="NAW/IT/2025/F/0001" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Contact No</label>
                            <input type="tel" name="phone1" placeholder="07XXXXXXXX" maxlength="10" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gender</label>
                            <select name="gender" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Guardian Details -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-amber-100 text-amber-600 p-2 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        </span>
                        <h2 class="text-xl font-bold">Guardian Details</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <input type="text" name="guardian_name" required placeholder="Guardian Name" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <input type="tel" name="guardian_phone" required placeholder="07XXXXXXXX" maxlenth="10" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <select name="guardian_type" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            <option>Father</option>
                            <option>Mother</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <!-- O/L & A/L Sections -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
                    <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                        <h2 class="font-bold mb-4 flex items-center gap-2 text-emerald-600">
                            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> O/L Results
                        </h2>
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <input type="text" name="ol_index" placeholder="Index No" class="p-2 text-xs bg-slate-50 border rounded-lg">
                            <input type="number" name="ol_year" placeholder="Year" class="p-2 text-xs bg-slate-50 border rounded-lg">
                            <select name="ol_medium" class="p-2 text-xs bg-slate-50 border rounded-lg col-span-2">
                                <option>English</option><option>Sinhala</option><option>Tamil</option>
                            </select>
                        </div>
                        <div id="ol-results-grid" class="grid grid-cols-3 gap-2"></div>
                    </div>

                    <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                        <h2 class="font-bold mb-4 flex items-center gap-2 text-purple-600">
                            <span class="w-2 h-6 bg-purple-500 rounded-full"></span> A/L Results
                        </h2>
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <input type="text" name="al_index" placeholder="Index No" class="p-2 text-xs bg-slate-50 border rounded-lg">
                            <input type="number" name="al_year" placeholder="Year" class="p-2 text-xs bg-slate-50 border rounded-lg">
                            <select id="al-stream-selector" name="al_stream" onchange="generateALInputs()" class="p-2 text-xs bg-slate-50 border rounded-lg">
                                <option value="maths">Combined Maths</option>
                                <option value="bio">Biology</option>
                                <option value="commerce">Commerce</option>
                                <option value="arts">Arts</option>
                            </select>
                            <select name="al_medium" class="p-2 text-xs bg-slate-50 border rounded-lg">
                                <option>English</option><option>Sinhala</option><option>Tamil</option>
                            </select>
                        </div>
                        <div id="al-results-grid" class="grid grid-cols-3 gap-2"></div>
                    </div>
                </div>

                <div class="flex justify-end gap-4 pb-20">
                    <button type="submit" id="submitBtn" class="w-full md:w-auto px-10 py-4 bg-sky-500 hover:bg-sky-600 text-white rounded-2xl font-bold shadow-xl shadow-sky-100 transition-all flex items-center justify-center gap-2">
                        Save to Cloud
                    </button>
                </div>
            </form>
        </div>

        <!-- VIEW: DIRECTORY -->
        <div id="view-directory" class="card-animate hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between gap-4">
                    <h2 class="text-xl font-bold">Cloud Database</h2>
                    <input type="text" id="searchBox" oninput="filterTable()" placeholder="Search records..." class="w-full md:w-80 px-4 py-2 bg-slate-50 border rounded-xl text-sm outline-none">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                            <tr>
                                <th class="px-6 py-4">Student</th>
                                <th class="px-6 py-4">Guardian</th>
                                <th class="px-6 py-4">Academics</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <div id="loadingState" class="p-12 text-center hidden">
                    <div class="inline-block w-8 h-8 border-4 border-slate-200 rounded-full loader mb-4"></div>
                    <p class="text-slate-400 text-sm">Accessing Google Sheets...</p>
                </div>
            </div>
        </div>

        <!-- VIEW: STATS -->
        <div id="view-stats" class="card-animate hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-center">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Total Students</p>
                    <h3 id="stat-total" class="text-5xl font-black text-sky-500">0</h3>
                </div>
                <div class="bg-emerald-500 p-8 rounded-3xl text-white text-center">
                    <p class="text-emerald-100 text-xs font-bold uppercase mb-2">Sync Status</p>
                    <h3 class="text-3xl font-black">Live</h3>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-[100]"></div>

    <script>
        const GRADES = ["A", "B", "C", "S", "W"];
        const OL_SUBS = ["Maths", "Science", "English", "History", "Religion", "Sinhala"];
        const AL_SUBS = {
            maths: ["Comb. Maths", "Physics", "Chemistry"],
            bio: ["Biology", "Chemistry", "Physics"],
            commerce: ["Accountancy", "Economics", "B.Studies"],
            arts: ["Art 01", "Art 02", "Art 03"]
        };

        let students = [];

        window.onload = () => {
            generateOLInputs();
            generateALInputs();
            checkConnection();
        };

        function checkConnection() {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if (typeof google !== 'undefined') {
                dot.className = 'w-2 h-2 rounded-full bg-emerald-500';
                txt.innerText = 'Connected';
                syncData();
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-amber-500';
                txt.innerText = 'Offline Mode (Local Only)';
            }
        }

        function generateOLInputs() {
            document.getElementById('ol-results-grid').innerHTML = OL_SUBS.map(s => `
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase">${s}</label>
                    <select name="ol_res_${s.toLowerCase()}" class="p-1 text-xs border rounded bg-slate-50">
                        <option value="">-</option>${GRADES.map(g => `<option>${g}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        function generateALInputs() {
            const stream = document.getElementById('al-stream-selector').value;
            document.getElementById('al-results-grid').innerHTML = AL_SUBS[stream].map(s => `
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase">${s}</label>
                    <select name="al_res_${s.toLowerCase().replace(/ /g,'_')}" class="p-1 text-xs border rounded bg-slate-50">
                        <option value="">-</option>${GRADES.map(g => `<option>${g}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        function switchTab(view) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`btn-${view}`).classList.add('tab-active');
            if(view !== 'register') syncData();
        }

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Connecting to Sheets...';

            const data = Object.fromEntries(new FormData(this).entries());

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler((res) => {
                        btn.disabled = false;
                        btn.innerHTML = 'Save to Cloud';
                        if(res.success) {
                            showToast("Student Record Saved to Sheet!");
                            e.target.reset();
                            syncData();
                        }
                    })
                    .saveStudentData(data);
            } else {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = 'Save to Cloud';
                    showToast("Simulated: Data sent to script.");
                    console.log(data);
                }, 1000);
            }
        });

        function syncData() {
            if (typeof google === 'undefined') return;
            document.getElementById('loadingState').classList.remove('hidden');
            google.script.run
                .withSuccessHandler((data) => {
                    students = data;
                    renderTable();
                    document.getElementById('stat-total').innerText = students.length;
                    document.getElementById('loadingState').classList.add('hidden');
                })
                .getStudents();
        }

        function renderTable() {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${s.full_name}</div>
                        <div class="text-[10px] text-sky-500 font-bold tracking-wider">${s.index_no} • ${s.nic}</div>
                        <div class="text-xs text-slate-400">${s.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-bold text-slate-700">${s.guardian_name}</div>
                        <div class="text-[10px] text-amber-600 font-bold uppercase">${s.guardian_type}</div>
                        <div class="text-xs text-slate-500">${s.guardian_phone}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-[9px] font-bold text-emerald-600">OL: ${s.ol_index || '-'}</div>
                        <div class="text-[9px] font-bold text-purple-600">AL: ${s.al_index || '-'} (${s.al_stream})</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="deleteRow('${s.index_no}')" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteRow(id) {
            if(confirm("Delete this record from Google Sheet?")) {
                if (typeof google !== 'undefined') {
                    google.script.run.withSuccessHandler(() => {
                        showToast("Record Deleted.");
                        syncData();
                    }).deleteStudentRecord(id);
                }
            }
        }

        function filterTable() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('#studentTableBody tr').forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 40px)';
            }, 3000);
        }
    </script>
</body>
</html>
